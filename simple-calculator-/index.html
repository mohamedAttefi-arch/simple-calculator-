<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator">
        <div id="display">0</div>
        <div id="buttons">
            <button id="clear">C</button>
            <button id="operator" onclick="appendOperator()">÷</button>
            <button id="operator" onclick="appendOperator()">×</button>
            <button id="operator" onclick="appendOperator()">⌫</button>

            <button id="number" onclick="appendNumber()">7</button>
            <button id="number" onclick="appendNumber()">8</button>
            <button id="number" onclick="appendNumber()">9</button>
            <button id="operator" onclick="appendOperator()">-</button>

            <button id="number" onclick="appendNumber()">4</button>
            <button id="number" onclick="appendNumber()">5</button>
            <button id="number" onclick="appendNumber()">6</button>
            <button id="operator" onclick="appendOperator()">+</button>

            <button id="number" onclick="appendNumber()">1</button>
            <button id="number" onclick="appendNumber()">2</button>
            <button id="number" onclick="appendNumber()">3</button>
            <button id="operator" onclick="appendOperator()">%</button>

            <button id="N0">0</button>
            <button id="decimal">.</button>
            <button id="equals">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
